services:
  postgres:
    image: postgres:16-alpine
    container_name: lumin-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: lumin
    ports:
      - "5432:5432"
    volumes:
      - lumin-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lumin"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  lumin-postgres-data:
